<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Citas - Clínica Ricardo Palma</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}"><i class="fas fa-hospital-user me-2"></i>CLÍNICA RICARDO PALMA</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/#nosotros}">Nosotros</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/programar}">Reservar Cita</a></li>
                    <li class="nav-item"><a class="nav-link active btn btn-outline-light ms-lg-3 px-4" th:href="@{/mis-citas}">Mis Citas</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/login}">Iniciar Sesión</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/register}">Registrarse</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <h2 class="text-center mb-5 fw-bold">Mis Citas Próximas</h2>
            <div class="table-responsive card-custom p-3 bg-white">
                <table class="table align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Especialidad</th>
                            <th>Médico</th>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="appointmentsList">
                        <tr id="noAppointmentsRow">
                            <td colspan="6" class="text-center text-muted py-4">No tienes citas agendadas.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/script.js}"></script>
    <script th:src="@{/mis-citas.js}"></script>
</body>
</html>
